packages:
  - demos/*
  - docs
  - examples/*
  - packages/*
  - tools/*

# https://pnpm.io/settings#blockexoticsubdeps
blockExoticSubdeps: true

# Pin exact versions on install — no caret ranges.
saveExact: true

# https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 1440

# https://pnpm.io/catalogs
catalog:
  "@a2a-js/sdk": 0.2.2
  "@hono/node-server": 2.0.5
  "@hono/standard-validator": 0.2.2
  bit-buffers: 1.0.2
  hono: 4.12.26
  jose: 6.2.3
  safe-stable-stringify: 2.5.0
  standard-matchers: 0.1.0
  uuid: 14.0.0
  valibot: 1.4.1
  viem: 2.52.2
  zod: 3.25.4

# Force patched versions of vulnerable transitive dependencies (pnpm audit).
# Scoped by major where multiple vulnerable lines coexist in the tree.
# https://pnpm.io/settings#overrides
overrides:
  "body-parser@1": "^1.20.3"
  "body-parser@2": "^2.2.1"
  "path-to-regexp@0.1": "^0.1.13"
  "qs@6": "^6.15.2"
  "picomatch@2": "^2.3.2"
  "picomatch@4": "^4.0.4"
  "js-yaml@3": "^3.14.2"
  "ws@8": "^8.20.1"
  "uuid@11": "^11.1.1"
  "tar@7": "^7.5.16"
  rollup: "^4.59.0"
  vite: "^7.3.5"
  postcss: "^8.5.10"
  esbuild: "^0.25.0"
  jsondiffpatch: "^0.7.2"

allowBuilds:
  better-sqlite3: true
  esbuild: true
  keytar: false
  puppeteer: false
  sharp: false
